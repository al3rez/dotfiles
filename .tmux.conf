# Prefix: Ctrl+a
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,foot*:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Don't let shells rename windows — petname owns the name
set -g allow-rename off
setw -g automatic-rename off

# New windows/sessions get a petname (expanded once, not re-evaluated)
set-hook -g after-new-window   "run-shell 'tmux rename-window \"  $(petname)\"'"
set-hook -g after-new-session  "run-shell 'tmux rename-window \"  $(petname)\"'"

# Status bar (Solarized Osaka Night) — centered tabs, no left/right
set -g status on
set -g status-interval 2
set -g status-position top
set -g status 2
set -g status-format[1] ""
set -g status-style "bg=#001419,fg=#839395"
set -g status-justify centre
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0

# Windows: Neovim bufferline-style slope tabs (chrome-like)
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#063540,bg=#001419]#[fg=#576d74,bg=#063540] #{?#{m:(chrome|google-chrome|chromium|firefox|brave|qutebrowser),#{pane_current_command}}, ,}#W #[fg=#063540,bg=#001419]"
setw -g window-status-current-format "#[fg=#b28500,bg=#001419]#[fg=#fdf5e2,bg=#b28500,bold] #{?#{m:(chrome|google-chrome|chromium|firefox|brave|qutebrowser),#{pane_current_command}}, ,}#W #[fg=#b28500,bg=#001419]"

# Panes
set -g pane-border-style "fg=#063540"
set -g pane-active-border-style "fg=#063540"
set -g pane-border-lines single

# Auto-resize: spread panes evenly when window resizes
set-hook -g after-resize-pane "select-layout -E"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Splits open in cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Break pane into its own window
bind B break-pane

# Popups (scripts optional — will no-op if missing)
bind e run-shell "~/.local/bin/tmux-sidebar-toggle"
bind = run-shell "~/.local/bin/tmux-layout-tiled"
bind M display-popup -w 70% -h 60% -E "~/.local/bin/tmux-move-pane-popup"
bind g run-shell "~/.local/bin/tmux-worktree-popup"
bind C-g display-popup -w 80% -h 80% -d "#{pane_current_path}" -E
