# Hyprland config — NVIDIA RTX 5070 / Fedora 43
# Driver 580.142, nvidia-drm modeset=1 fbdev=1

# LG ULTRAGEAR+ 3840x2160@240Hz — 140 DPI, scale 1.5 -> logical 2560x1440
monitor = DP-3, 3840x2160@240, 0x0, 1.5
# Catch-all for any other monitor
monitor = , preferred, auto, 1.5

# --- NVIDIA env vars ---
# https://wiki.hyprland.org/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __EGL_VENDOR_LIBRARY_FILENAMES,/usr/share/glvnd/egl_vendor.d/10_nvidia.json
env = NVD_BACKEND,direct
env = __GL_THREADED_OPTIMIZATIONS,1
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DISABLE_RDD_SANDBOX,1
env = MOZ_X11_EGL,1

# Cursor: hardware cursors are stable on driver 555+, leave them on.
# Uncomment if you see an invisible cursor:
# env = WLR_NO_HARDWARE_CURSORS,1

# Toolkit/Wayland hints
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11

xwayland {
    force_zero_scaling = true
}

# --- Input ---
input {
    kb_layout = us,ir
    kb_model = pc105
    kb_options = ctrl:nocaps,grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 6
    # Blur is fine on modern NVIDIA, but disable if you hit perf issues.
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    # Snappier curves than defaults
    bezier = snap, 0.05, 0.9, 0.1, 1.0
    bezier = quick, 0.15, 0.85, 0.25, 1.0

    animation = windows,     1, 3, snap,  popin 80%
    animation = windowsOut,  1, 3, snap,  popin 80%
    animation = border,      1, 4, quick
    animation = borderangle, 1, 4, quick
    animation = fade,        1, 3, quick
    animation = workspaces,  1, 3, snap,  slide
}

misc {
    vfr = true
    vrr = 0
    disable_hyprland_logo = true
}

# --- Autostart ---
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = walker --gapplication-service

# --- Keybinds (omarchy-style, vanilla-Fedora compatible) ---
$mod = SUPER
$browser = google-chrome-stable --ozone-platform-hint=auto --enable-features=UseOzonePlatform,WaylandWindowDecorations
$fileManager = dolphin
$terminal = env __GL_THREADED_OPTIMIZATIONS=0 kitty

# Apps
bind = $mod,        Return, exec, $terminal
bind = $mod SHIFT,  Return, exec, $browser
bind = $mod,        B,      exec, $browser
bind = $mod SHIFT,  F,      exec, $fileManager
bind = $mod,        SPACE,  exec, walker

# Windows
bind = $mod,        W,      killactive,
bind = $mod SHIFT,  V,      togglefloating,
bind = $mod,        J,      togglesplit,
bind = $mod,        P,      pseudo,
bind = $mod,        F,      fullscreen, 0
bind = ALT,         F11,    fullscreen, 1
bind = SHIFT,       F11,    fullscreen, 0
bind = $mod,        M,      exit,

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Swap windows
bind = $mod SHIFT, left,  swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up,    swapwindow, u
bind = $mod SHIFT, down,  swapwindow, d

# Resize active window (- and = keys)
bind = $mod,       code:20, resizeactive, -100 0
bind = $mod,       code:21, resizeactive,  100 0
bind = $mod SHIFT, code:20, resizeactive, 0 -100
bind = $mod SHIFT, code:21, resizeactive, 0  100

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Workspace navigation
bind = $mod,       TAB, workspace, e+1
bind = $mod SHIFT, TAB, workspace, e-1
bind = $mod CTRL,  TAB, workspace, previous

# Cycle windows
bind = ALT,       TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev
bind = ALT,       TAB, bringactivetotop
bind = ALT SHIFT, TAB, bringactivetotop

# Scroll workspaces with mouse wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse drag move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = ,           PRINT, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Region copied to clipboard" 2>/dev/null
bind = SHIFT,      PRINT, exec, grim - | wl-copy && notify-send "Screen copied to clipboard" 2>/dev/null
bind = $mod,       PRINT, exec, pkill hyprpicker || hyprpicker -a
