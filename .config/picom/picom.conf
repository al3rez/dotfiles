# Picom config focused on fixing GTK black background issues.
# Uses GLX backend and conservative settings for broad compatibility.

backend = "glx";
vsync = true;

# GLX tweaks to avoid common texture/redirect issues in GTK apps.
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;

# Avoid unredirecting fullscreen, which can trigger black backgrounds.
unredir-if-possible = false;

# Keep damage tracking enabled unless you see glitches.
use-damage = true;

# Rounded corners
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'i3bar'"
];

# Shadows
shadow = true;
shadow-radius = 14;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'i3bar'",
  "_GTK_FRAME_EXTENTS@:c"
];
